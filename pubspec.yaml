name: hame_shop
description: "A professional e-commerce platform for Ethiopia, featuring bilingual support (English/Amharic) and AI-powered product suggestions."
publish_to: 'none' # private package

version: 1.0.0+1

environment:
  sdk: '^3.1.0'  # fixed SDK constraint

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_animate: ^4.5.2
  intl: ^0.18.1
  provider: ^6.1.5+1
  easy_localization: ^3.0.8
  google_fonts: ^5.1.0
  url_launcher: ^6.2.4
  shared_preferences: ^2.2.3
  chapa_unofficial: ^0.0.5
  uuid: ^4.2.2
  image_picker: ^1.0.8
  carousel_slider: ^5.1.2
  google_sign_in: ^6.1.6
  share_plus: ^7.2.2
  dio: ^5.4.1
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.2.3
  dio_cache_interceptor: ^3.4.4
  dio_cache_interceptor_hive_store: ^3.2.1
  path_provider: ^2.1.2
  google_generative_ai: ^0.4.7

  # --- Firebase dependencies ---
  firebase_core: ^2.24.2
  cloud_firestore: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.11.0  # correctly placed here

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - assets/developer.jpg
    - assets/admin.jpg
    - assets/10711.png